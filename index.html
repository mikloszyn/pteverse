<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialVibe - Portal Społecznościowy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 border-b border-slate-200 py-4 mb-8">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <a href="#" class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">SocialVibe</a>
            <div class="flex items-center gap-6">
                <a href="#" class="text-slate-600 font-semibold hover:text-blue-600">Logowanie</a>
                <a href="#" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Dołącz</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
                    <textarea placeholder="O czym myślisz?" class="w-full h-32 p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none resize-none mb-4"></textarea>
                    <button class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Opublikuj post</button>
                </div>

                <div class="bg-white p-8 rounded-[24px] shadow-sm border border-slate-100 hover:border-blue-200 transition">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 flex items-center justify-center font-bold text-blue-600">J</div>
                        <div>
                            <h3 class="font-bold text-slate-900">Jan Kowalski</h3>
                            <p class="text-xs text-slate-400 font-medium">12:45 · 08.04.2024</p>
                        </div>
                    </div>
                    <p class="text-slate-700 leading-relaxed text-lg">Właśnie testuję nowy interfejs mojego portalu! Co myślicie? ✨</p>
                </div>
            </div>

            <div class="hidden md:block">
                <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 rounded-[32px] text-white shadow-xl shadow-blue-200">
                    <h2 class="text-2xl font-extrabold mb-4">Witaj w SocialVibe!</h2>
                    <p class="opacity-90 leading-relaxed">To jest podgląd interfejsu. Aby logowanie działało, potrzebujesz serwera z Pythonem.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
